services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: knockwise
      MYSQL_USER: knockwise
      MYSQL_PASSWORD: knockwise
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  whisper-live:
    image: ghcr.io/collabora/whisperlive:latest
    ports:
      - "9090:9090"
    environment:
      WHISPER_MODEL: base
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Phase 1a · 缓存层 (review_queue / topic_stats / today_digest)
    # 优雅降级: 挂了 backend 自动 fallback 到 DB

  livekit:
    image: livekit/livekit-server:v1.7.3
    command: --config /etc/livekit.yaml --node-ip=127.0.0.1
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml

  rsshub:
    image: diygod/rsshub:2024-03-28
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    # Phase 4 · AI 推送 RSSHub fallback (T30 · 决策 1)
    # 直连信源失败时通过 http://localhost:1200/<route> 二次抓取
    # 验证: curl http://localhost:1200/juejin/tag/AI
    # 路由参考: https://docs.rsshub.app/

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+aiomysql://knockwise:knockwise@mysql:3306/knockwise
      REDIS_URL: redis://redis:6379/0
      WHISPER_LIVE_URL: ws://whisper-live:9090
      LIVEKIT_URL: ws://livekit:7880
      RSSHUB_URL: http://rsshub:1200
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    depends_on:
      - mysql
      - livekit
      - rsshub

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
